<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gera links de busca otimizados para encontrar grupos no Facebook por nicho." />
  <title>Buscador de Grupos do Facebook por Nicho</title>

  <!-- Fonte -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <!-- ─── Hero ──────────────────────────────────────────────────────────────── -->
  <header class="hero">
    <div class="hero-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
      </svg>
    </div>
    <h1>Buscador de grupos por nicho</h1>
    <p>Gera links de busca otimizados para encontrar grupos no Facebook.</p>
  </header>

  <!-- ─── Card principal ────────────────────────────────────────────────────── -->
  <main>
    <div class="card">

      <span class="label" id="niches-label">Nichos populares</span>
      <!-- Preenchido por app.js via renderNiches() -->
      <div class="niches" id="niches-container" role="group" aria-labelledby="niches-label"></div>

      <div class="divider" role="separator"></div>

      <label class="label" for="query">Ou digite seu nicho</label>
      <div class="search-row">
        <input
          type="search"
          id="query"
          name="query"
          placeholder="Ex: costura artesanal, academia, fotografia..."
          autocomplete="off"
          maxlength="120"
          aria-label="Digite o nicho para buscar grupos"
        />
        <button class="btn-primary" onclick="generate()" aria-label="Gerar links de busca">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          Buscar
        </button>
      </div>

      <div class="divider" role="separator"></div>

      <span class="label" id="filters-label">Tipo de grupo</span>
      <div class="filters" role="group" aria-labelledby="filters-label">
        <button class="filter-btn active" onclick="toggleFilter(this, 'publico')" aria-pressed="true">Público</button>
        <button class="filter-btn active" onclick="toggleFilter(this, 'privado')" aria-pressed="true">Privado</button>
      </div>

    </div>

    <!-- ─── Resultados ──────────────────────────────────────────────────────── -->
    <section id="results-section" aria-live="polite" aria-label="Resultados" style="display:none">
      <div class="results-header">
        <span class="results-count" id="results-count" aria-atomic="true"></span>
      </div>
      <div id="results"></div>
    </section>

    <!-- ─── Estado vazio ────────────────────────────────────────────────────── -->
    <div id="empty-state" class="empty" role="status" style="display:none">
      <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Selecione pelo menos um tipo de grupo e escreva seu nicho.</p>
    </div>

  </main>

  <!-- ─── Footer ────────────────────────────────────────────────────────────── -->
  <footer>
    Os links abrem a busca diretamente no Facebook &mdash; feito com ♥ e Claude
  </footer>

</div>

<!-- data.js antes de app.js (app depende de NICHOS, buildTerms, getIcon) -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
